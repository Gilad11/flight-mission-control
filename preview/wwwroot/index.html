function StatusPage() {
  const [people, setPeople] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchQ, setSearchQ] = useState('');
  const [filterGroup, setFilterGroup] = useState('');
  const [filterHotel, setFilterHotel] = useState('');
  const [refreshKey, setRefreshKey] = useState(0);

  useEffect(() => {
    setPeople(getPeopleInCountry());
    setLoading(false);
  }, [refreshKey]);

  const hotels = useMemo(() => {
    const s = new Set(people.map(p => p.hotel).filter(Boolean));
    return [...s].sort();
  }, [people]);

  const filtered = useMemo(() => {
    let d = [...people];
    if (filterGroup) d = d.filter(p => p.group === filterGroup);
    if (filterHotel) d = d.filter(p => p.hotel === filterHotel);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      d = d.filter(p => p.fullName?.toLowerCase().includes(q) || p.hotel?.toLowerCase().includes(q) || p.group?.toLowerCase().includes(q));
    }
    return d;
  }, [people, filterGroup, filterHotel, searchQ]);

  // Hotel breakdown
  const hotelBreakdown = useMemo(() => {
    const m = {};
    people.forEach(p => { if (p.hotel) m[p.hotel] = (m[p.hotel] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [people]);

  // Group breakdown
  const groupBreakdown = useMemo(() => {
    const m = {};
    GROUPS.forEach(g => { m[g] = 0; });
    people.forEach(p => { if (p.group) m[p.group] = (m[p.group] || 0) + 1; });
    return m;
  }, [people]);

  if (loading) return (
    <div className="flex items-center justify-center h-screen">
      <div className="flex flex-col items-center gap-3 text-gray-400"><i className="bi bi-geo-alt text-4xl anim-bounce"></i><p>טוען מצב נוכחי...</p></div>
    </div>
  );

  return (
    <div className="p-6 max-w-[1400px] mx-auto fade-in">
      {/* Page Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <i className="bi bi-geo-alt-fill text-cyan-600 text-2xl"></i> מצב נוכחי
          </h1>
          <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">
            תמונת מצב בזמן אמת — אנשים הנמצאים כעת במדינת היעד
          </p>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-400 dark:text-gray-600 flex items-center gap-1"><i className="bi bi-lock text-[10px]"></i> קריאה בלבד</span>
          <button onClick={() => { setLoading(true); setRefreshKey(k => k + 1); }}
            className="flex items-center gap-1.5 px-3.5 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm transition-all">
            <i className="bi bi-arrow-clockwise"></i> רענן
          </button>
        </div>
      </div>

      {/* Total In Country - Hero Card */}
      <div className="bg-gradient-to-l from-cyan-600 to-indigo-600 rounded-2xl p-6 mb-6 text-white shadow-lg">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-sm font-medium opacity-80 mb-1">סה"כ נמצאים בארץ</div>
            <div className="text-5xl font-extrabold">{people.length}</div>
            <div className="text-sm opacity-70 mt-1">{hotels.length} מלונות · {Object.values(groupBreakdown).filter(v => v > 0).length} קבוצות פעילות</div>
          </div>
          <div className="bg-white/20 backdrop-blur-sm rounded-2xl p-4">
            <i className="bi bi-geo-alt-fill text-4xl"></i>
          </div>
        </div>
      </div>

      {/* Group Breakdown Cards */}
      <div className="mb-6">
        <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-3 flex items-center gap-2">
          <i className="bi bi-people text-indigo-500"></i> פירוט לפי קבוצה
        </h3>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
          {GROUPS.map(group => {
            const colors = GROUP_COLORS[group] || {};
            const count = groupBreakdown[group] || 0;
            const poc = getGroupPocs()[group] || '';
            return (
              <div key={group} className={`rounded-xl border px-4 py-3 shadow-sm transition-all ${count > 0 ? colors.bg + ' ' + colors.border : 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700 opacity-50'}`}>
                <div className={`text-3xl font-extrabold ${count > 0 ? colors.text : 'text-gray-300 dark:text-gray-600'}`}>{count}</div>
                <div className={`text-xs font-semibold mt-1 ${count > 0 ? colors.text + ' opacity-80' : 'text-gray-400 dark:text-gray-600'}`}>{group}</div>
                {poc && count > 0 && (
                  <div className={`text-[10px] mt-1.5 flex items-center gap-1 ${colors.text} opacity-60`}>
                    <i className="bi bi-person-badge text-[9px]"></i>
                    <span className="truncate">{poc}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Hotel Breakdown Cards */}
      {hotelBreakdown.length > 0 && (
        <div className="mb-6">
          <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-3 flex items-center gap-2">
            <i className="bi bi-building text-indigo-500"></i> פירוט לפי מלון
          </h3>
          <div className="flex flex-wrap gap-3">
            {hotelBreakdown.map(([hotel, count]) => {
              const ratings = getHotelRatings();
              return (
                <div key={hotel} className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-5 py-3 shadow-sm">
                  <div className="flex items-center gap-2 mb-1">
                    <i className="bi bi-building text-indigo-500"></i>
                    <span className="font-semibold text-gray-900 dark:text-gray-100">{hotel}</span>
                  </div>
                  <div className="flex items-center justify-between gap-4">
                    <StarRating rating={ratings[hotel] || 0} />
                    <span className="text-cyan-600 dark:text-cyan-400 font-bold bg-cyan-50 dark:bg-cyan-900/30 px-2.5 py-0.5 rounded-full text-sm">
                      {count} {count === 1 ? 'אדם' : 'אנשים'}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Filters */}
      <div className="flex flex-wrap items-center gap-3 mb-4">
        <div className="relative flex-1 min-w-[200px]">
          <i className="bi bi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input type="text" placeholder="חיפוש לפי שם, מלון, קבוצה..." value={searchQ} onChange={e => setSearchQ(e.target.value)}
            className="w-full pr-9 pl-3 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-cyan-400" />
        </div>
        <select value={filterGroup} onChange={e => setFilterGroup(e.target.value)}
          className="text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 focus:outline-none focus:border-cyan-400">
          <option value="">כל הקבוצות</option>
          {GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <select value={filterHotel} onChange={e => setFilterHotel(e.target.value)}
          className="text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 focus:outline-none focus:border-cyan-400">
          <option value="">כל המלונות</option>
          {hotels.map(h => <option key={h} value={h}>{h}</option>)}
        </select>
        {(searchQ || filterGroup || filterHotel) && (
          <button onClick={() => { setSearchQ(''); setFilterGroup(''); setFilterHotel(''); }}
            className="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
            <i className="bi bi-x-lg text-gray-400 text-xs"></i>
          </button>
        )}
        <span className="text-sm text-gray-500 dark:text-gray-400 mr-auto">{filtered.length} מתוך {people.length}</span>
      </div>

      {/* Read-Only Detailed Table */}
      <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="min-w-full">
            <thead>
              <tr>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-center w-16">מס׳</th>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-right">שם מלא</th>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-right">קבוצה</th>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-right">מלון נוכחי</th>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-right">טיסת הגעה</th>
                <th className="px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 text-right">תאריך הגעה</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr>
                  <td colSpan={6} className="text-center py-16 text-gray-400 dark:text-gray-600">
                    <i className="bi bi-geo-alt text-4xl block mb-3 opacity-30"></i>
                    <p className="font-medium">אין אנשים בארץ כרגע</p>
                    <p className="text-xs mt-1">לא נמצאו נוסעים שהגיעו בטיסת נכנסים ללא טיסת יציאה עוקבת</p>
                  </td>
                </tr>
              ) : filtered.map((p, idx) => {
                const gc = GROUP_COLORS[p.group] || {};
                return (
                  <tr key={p.id + idx} className={`border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors ${idx % 2 !== 0 ? 'bg-gray-50/30 dark:bg-gray-800/20' : ''}`}>
                    <td className="px-4 py-3 text-center text-sm font-mono text-gray-400">{idx + 1}</td>
                    <td className="px-4 py-3 text-sm font-semibold text-gray-900 dark:text-gray-100 whitespace-nowrap">{p.fullName}</td>
                    <td className="px-4 py-3">
                      <span className={`text-xs px-2.5 py-1 rounded-full border font-medium whitespace-nowrap ${gc.bg} ${gc.text} ${gc.border}`}>{p.group}</span>
                    </td>
                    <td className="px-4 py-3 text-sm">
                      {p.hotel ? (
                        <span className="flex items-center gap-1.5 text-gray-700 dark:text-gray-300">
                          <i className="bi bi-building text-gray-400 text-xs"></i>{p.hotel}
                        </span>
                      ) : <span className="text-gray-400 text-xs">{'\u2014'}</span>}
                    </td>
                    <td className="px-4 py-3 text-sm font-mono text-gray-600 dark:text-gray-400">{p.arrivalFlight || '\u2014'}</td>
                    <td className="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">{p.arrivalDate ? formatDate(p.arrivalDate) : '\u2014'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Footer summary */}
        {filtered.length > 0 && (
          <div className="border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 px-4 py-3 rounded-b-xl">
            <div className="flex flex-wrap gap-4">
              <div className="flex items-center gap-1.5">
                <span className="text-sm text-gray-600 dark:text-gray-400">סה"כ בארץ:</span>
                <span className="font-bold text-cyan-600 dark:text-cyan-400">{filtered.length}</span>
              </div>
              <div className="flex flex-wrap gap-2 mr-auto">
                {GROUPS.map(g => {
                  const cnt = filtered.filter(p => p.group === g).length;
                  if (!cnt) return null;
                  const gc = GROUP_COLORS[g] || {};
                  return <div key={g} className={`flex items-center gap-1 text-xs px-2.5 py-1 rounded-full border ${gc.bg} ${gc.text} ${gc.border}`}>
                    <span className="font-semibold">{g}:</span><span className="font-bold">{cnt}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━ SIDEBAR ━━━━━━━━━━━━━━━━━━━━

function Sidebar({ page, onNavigate, dark, onToggleDark, onOpenSync }) {
  const [hovered, setHovered] = useState(null);
  const items = [
    { id: 'dashboard', icon: 'bi-grid-3x3-gap-fill', label: 'לוח בקרה' },
    { id: 'status', icon: 'bi-geo-alt-fill', label: 'מצב נוכחי' },
    { id: 'add', icon: 'bi-person-plus-fill', label: 'הוסף נוסע' },
    { id: 'edit', icon: 'bi-pencil-fill', label: 'עריכה וניהול' },
    { id: 'archive', icon: 'bi-archive-fill', label: 'ארכיון' },
    { id: 'guide', icon: 'bi-book', label: 'מדריך' },
  ];
  return (
    <aside className="fixed right-0 top-0 h-full w-16 bg-gray-900 dark:bg-gray-950 flex flex-col items-center py-4 z-50 border-l border-gray-700">
      <div className="mb-6">
        <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
          <i className="bi bi-airplane-fill text-white text-lg"></i>
        </div>
      </div>
      <nav className="flex flex-col gap-2 flex-1">
        {items.map(({ id, icon, label }) => (
          <div key={id} className="relative" onMouseEnter={() => setHovered(id)} onMouseLeave={() => setHovered(null)}>
            <button onClick={() => onNavigate(id)}
              className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${page === id ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
              <i className={`bi ${icon}`}></i>
            </button>
            {hovered === id && (
              <div className="absolute right-14 top-1/2 -translate-y-1/2 bg-gray-800 text-white text-sm px-3 py-1.5 rounded-lg whitespace-nowrap shadow-lg pointer-events-none z-50 border border-gray-700">
                {label}
                <div className="absolute top-1/2 -translate-y-1/2 -right-1.5 w-0 h-0 border-t-4 border-b-4 border-l-4 border-transparent border-l-gray-800" />
              </div>
            )}
          </div>
        ))}
      </nav>
      {/* Sync button */}
      <div className="relative mb-2" onMouseEnter={() => setHovered('sync')} onMouseLeave={() => setHovered(null)}>
        <button onClick={onOpenSync}
          className="w-10 h-10 rounded-xl text-gray-400 hover:bg-gray-700 hover:text-white flex items-center justify-center transition-all relative">
          <i className="bi bi-cloud-arrow-up"></i>
          <div className="absolute top-1 left-1"><SyncStatusDot /></div>
        </button>
        {hovered === 'sync' && (
          <div className="absolute right-14 top-1/2 -translate-y-1/2 bg-gray-800 text-white text-sm px-3 py-1.5 rounded-lg whitespace-nowrap shadow-lg pointer-events-none z-50 border border-gray-700">
            סנכרון Google Sheets
            <div className="absolute top-1/2 -translate-y-1/2 -right-1.5 w-0 h-0 border-t-4 border-b-4 border-l-4 border-transparent border-l-gray-800" />
          </div>
        )}
      </div>
      <button onClick={onToggleDark} className="w-10 h-10 rounded-xl text-gray-400 hover:bg-gray-700 hover:text-white flex items-center justify-center transition-all"
        title={dark ? 'מצב בהיר' : 'מצב כהה'}>
        <i className={`bi ${dark ? 'bi-sun-fill' : 'bi-moon-fill'}`}></i>
      </button>
    </aside>
  );
}

// ━━━━━━━━━━━━━━━━━━━━ APP ━━━━━━━━━━━━━━━━━━━━

function App() {
  const [page, setPage] = useState('dashboard');
  const [dark, setDark] = useState(false);
  const [ready, setReady] = useState(false);
  const [showSyncPanel, setShowSyncPanel] = useState(false);

  useEffect(() => {
    const stored = localStorage.getItem(DARK_KEY);
    if (stored === 'true' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setDark(true); document.documentElement.classList.add('dark');
    }
    setReady(true);
    // Start sync if configured
    startSyncInterval();
    return () => stopSyncInterval();
  }, []);

  const toggleDark = () => {
    const next = !dark;
    setDark(next);
    localStorage.setItem(DARK_KEY, String(next));
    document.documentElement.classList.toggle('dark', next);
  };

  if (!ready) return (
    <div className="flex items-center justify-center h-screen">
      <div className="text-center text-gray-400"><i className="bi bi-airplane text-4xl block mb-3 spin"></i><p>טוען...</p></div>
    </div>
  );

  return (
    <div className="flex min-h-screen">
      <Sidebar page={page} onNavigate={setPage} dark={dark} onToggleDark={toggleDark} onOpenSync={() => setShowSyncPanel(true)} />
      <main className="flex-1 mr-16 overflow-x-hidden min-h-screen">
        {page === 'dashboard' && <DashboardPage />}
        {page === 'status' && <StatusPage />}
        {page === 'add' && <AddPage onNavigate={setPage} />}
        {page === 'edit' && <EditPage />}
        {page === 'archive' && <ArchivePage />}
        {page === 'guide' && <GuidePage />}
      </main>
      <ToastContainer />
      {showSyncPanel && <SyncPanel onClose={() => setShowSyncPanel(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
