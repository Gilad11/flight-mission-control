// ━━━━━━━━━━━━━━━━━━━━ STORAGE ━━━━━━━━━━━━━━━━━━━━
const FLIGHTS_KEY = 'flightmanager_flights';
const TRAVELERS_KEY = 'flightmanager_travelers';
const HOTEL_RATINGS_KEY = 'flightmanager_hotel_ratings';
const DARK_KEY = 'darkMode';

function generateId() {
  return Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
}

function getFlights() {
  try { const d = localStorage.getItem(FLIGHTS_KEY); return d ? JSON.parse(d) : MOCK_FLIGHTS; } catch { return MOCK_FLIGHTS; }
}
function saveFlights(f) { localStorage.setItem(FLIGHTS_KEY, JSON.stringify(f)); }
function addFlightToStorage(flight) {
  const flights = getFlights();
  const nf = { ...flight, id: generateId(), createdAt: new Date().toISOString() };
  saveFlights([...flights, nf]);
  queueSync('addFlight', nf);
  return nf;
}
function deleteFlightFromStorage(id) {
  const flights = getFlights();
  saveFlights(flights.filter(f => f.id !== id));
  const travelers = getTravelers();
  const affected = travelers.filter(t => t.flightId === id && !t.isArchived);
  saveTravelers(travelers.map(t => t.flightId === id ? { ...t, isArchived: true } : t));
  queueSync('deleteFlight', null, id);
  affected.forEach(t => queueSync('updateTraveler', { isArchived: true }, t.id));
}

function getTravelers() {
  try { const d = localStorage.getItem(TRAVELERS_KEY); return d ? JSON.parse(d) : MOCK_TRAVELERS; } catch { return MOCK_TRAVELERS; }
}
function saveTravelers(t) { localStorage.setItem(TRAVELERS_KEY, JSON.stringify(t)); }
function addTravelerToStorage(traveler) {
  const travelers = getTravelers();
  const flightTravelers = travelers.filter(t => t.flightId === traveler.flightId && !t.isArchived);
  const serial = flightTravelers.length + 1;
  const nt = { ...traveler, id: generateId(), serial, isArchived: false, createdAt: new Date().toISOString() };
  saveTravelers([...travelers, nt]);
  queueSync('addTraveler', nt);
  return nt;
}
function updateTravelerInStorage(id, updates) {
  const travelers = getTravelers();
  saveTravelers(travelers.map(t => t.id === id ? { ...t, ...updates } : t));
  queueSync('updateTraveler', updates, id);
}
function deleteTravelerFromStorage(id) {
  const travelers = getTravelers();
  saveTravelers(travelers.map(t => t.id === id ? { ...t, isArchived: true } : t));
  queueSync('deleteTraveler', null, id);
}
function restoreTravelerInStorage(id) {
  const travelers = getTravelers();
  saveTravelers(travelers.map(t => t.id === id ? { ...t, isArchived: false } : t));
  queueSync('restoreTraveler', null, id);
}
function permanentDeleteTraveler(id) {
  const travelers = getTravelers();
  saveTravelers(travelers.filter(t => t.id !== id));
  queueSync('permanentDeleteTraveler', null, id);
}

function getHotelRatings() {
  try {
    const d = localStorage.getItem(HOTEL_RATINGS_KEY);
    return d ? { ...DEFAULT_HOTEL_RATINGS, ...JSON.parse(d) } : { ...DEFAULT_HOTEL_RATINGS };
  } catch { return { ...DEFAULT_HOTEL_RATINGS }; }
}
function setHotelRatingInStorage(hotelName, rating) {
  const ratings = getHotelRatings();
  ratings[hotelName] = Math.min(5, Math.max(1, rating));
  localStorage.setItem(HOTEL_RATINGS_KEY, JSON.stringify(ratings));
  queueSync('setSetting', { key: 'hotel_rating_' + hotelName, value: String(rating) });
}

function getGroupPocs() {
  try {
    const d = localStorage.getItem(GROUP_POCS_KEY);
    return d ? { ...DEFAULT_GROUP_POCS, ...JSON.parse(d) } : { ...DEFAULT_GROUP_POCS };
  } catch { return { ...DEFAULT_GROUP_POCS }; }
}
function setGroupPocInStorage(group, pocName) {
  const pocs = getGroupPocs();
  pocs[group] = pocName;
  localStorage.setItem(GROUP_POCS_KEY, JSON.stringify(pocs));
  queueSync('setSetting', { key: 'poc_' + group, value: pocName });
}

function getTodaysFlights() {
  const flights = getFlights();
  const today = new Date().toISOString().split('T')[0];
  return flights
    .filter(f => f.date === today)
    .sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
}

function getTravelersForFlight(flightId) {
  return getTravelers().filter(t => t.flightId === flightId && !t.isArchived);
}

// Get people currently "in country" — arrived on an incoming flight
// with no subsequent outgoing flight
function getPeopleInCountry() {
  const allTravelers = getTravelers().filter(t => !t.isArchived);
  const allFlights = getFlights();
  const flightMap = {};
  allFlights.forEach(f => { flightMap[f.id] = f; });
  const now = new Date();

  // Group travelers by nationalId (unique identity across flights)
  const personMap = {};
  allTravelers.forEach(t => {
    const key = t.nationalId || t.fullName;
    if (!personMap[key]) personMap[key] = [];
    personMap[key].push(t);
  });

  const inCountry = [];

  for (const [key, records] of Object.entries(personMap)) {
    // Get all flight records for this person, only past/current flights
    const withFlights = records
      .map(r => ({ ...r, _flight: flightMap[r.flightId] }))
      .filter(r => r._flight && new Date(`${r._flight.date}T${r._flight.time}`) <= now)
      .sort((a, b) => {
        const dtA = new Date(`${a._flight.date}T${a._flight.time}`);
        const dtB = new Date(`${b._flight.date}T${b._flight.time}`);
        return dtB - dtA; // most recent first
      });

    if (withFlights.length > 0) {
      const latest = withFlights[0];
      // Person is in-country if their most recent flight was incoming
      if (latest._flight.direction === 'incoming') {
        inCountry.push({
          ...latest,
          arrivalDate: latest._flight.date,
          arrivalFlight: latest._flight.flightNumber
        });
      }
    }
  }

  return inCountry.sort((a, b) => a.fullName.localeCompare(b.fullName, 'he'));
}

// ━━━━━━━━━━━━━━━━━━━━ GOOGLE SHEETS SYNC ━━━━━━━━━━━━━━━━━━━━

// Paste your deployed Google Apps Script Web App URL here:
const SHEETS_API_URL = '';
const SYNC_KEY = 'flightmanager_sync_meta';
const SYNC_QUEUE_KEY = 'flightmanager_sync_queue';

// Sync status: 'idle' | 'syncing' | 'synced' | 'error' | 'offline'
let _syncStatus = 'idle';
let _syncListeners = [];
let _syncTimer = null;
let _pullInterval = null;

function getSyncEnabled() { return SHEETS_API_URL.length > 0; }

function getSyncStatus() { return _syncStatus; }
function onSyncStatusChange(fn) { _syncListeners.push(fn); return () => { _syncListeners = _syncListeners.filter(f => f !== fn); }; }
function _setSyncStatus(s) { _syncStatus = s; _syncListeners.forEach(fn => fn(s)); }

function getSyncMeta() {
  try { const d = localStorage.getItem(SYNC_KEY); return d ? JSON.parse(d) : {}; } catch { return {}; }
}
function setSyncMeta(updates) {
  const meta = { ...getSyncMeta(), ...updates };
  localStorage.setItem(SYNC_KEY, JSON.stringify(meta));
}

// ── Sync Queue: track changes to push ──

function getSyncQueue() {
  try { const d = localStorage.getItem(SYNC_QUEUE_KEY); return d ? JSON.parse(d) : []; } catch { return []; }
}
function saveSyncQueue(q) { localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(q)); }

function queueSync(action, data, id) {
  if (!getSyncEnabled()) return;
  const queue = getSyncQueue();
  queue.push({ action, data: data || null, id: id || null, timestamp: Date.now() });
  saveSyncQueue(queue);

  // Debounce flush: 3 seconds after last change
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(flushSyncQueue, 3000);
}

async function flushSyncQueue() {
  if (!getSyncEnabled()) return;
  const queue = getSyncQueue();
  if (queue.length === 0) { _setSyncStatus('synced'); return; }

  _setSyncStatus('syncing');
  const batch = [...queue];
  saveSyncQueue([]); // Optimistically clear

  try {
    const res = await fetch(SHEETS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'batch', operations: batch })
    });
    const result = await res.json();
    if (result.success) {
      setSyncMeta({ lastPush: new Date().toISOString() });
      _setSyncStatus('synced');
    } else {
      throw new Error(result.error || 'Batch failed');
    }
  } catch (err) {
    console.error('Sync push error:', err);
    // Re-queue failed items
    const currentQueue = getSyncQueue();
    saveSyncQueue([...batch, ...currentQueue]);
    _setSyncStatus('error');
  }
}

// ── Pull from Sheets ──

async function pullFromSheets() {
  if (!getSyncEnabled()) return null;
  _setSyncStatus('syncing');

  try {
    const res = await fetch(SHEETS_API_URL + '?action=sync');
    const result = await res.json();

    if (!result.success) throw new Error(result.error || 'Pull failed');

    const { flights, travelers, settings, syncedAt } = result.data;

    // Merge flights — sheet data wins if we have no local pending changes
    if (flights && flights.length > 0) {
      const sheetFlights = flights.filter(f => !f.deleted);
      localStorage.setItem(FLIGHTS_KEY, JSON.stringify(sheetFlights));
    }

    // Merge travelers
    if (travelers && travelers.length > 0) {
      const sheetTravelers = travelers.map(t => ({
        ...t,
        transportBooked: t.transportBooked === true || t.transportBooked === 'TRUE',
        isArchived: t.isArchived === true || t.isArchived === 'TRUE',
        serial: typeof t.serial === 'string' ? parseInt(t.serial) || 0 : (t.serial || 0)
      }));
      localStorage.setItem(TRAVELERS_KEY, JSON.stringify(sheetTravelers));
    }

    // Merge settings
    if (settings && settings.length > 0) {
      const hotelRatings = { ...DEFAULT_HOTEL_RATINGS };
      const groupPocs = { ...DEFAULT_GROUP_POCS };

      settings.forEach(s => {
        if (s.key && s.key.startsWith('hotel_rating_')) {
          const hotel = s.key.replace('hotel_rating_', '');
          hotelRatings[hotel] = parseInt(s.value) || 0;
        } else if (s.key && s.key.startsWith('poc_')) {
          const group = s.key.replace('poc_', '');
          groupPocs[group] = s.value || '';
        }
      });

      localStorage.setItem(HOTEL_RATINGS_KEY, JSON.stringify(hotelRatings));
      localStorage.setItem(GROUP_POCS_KEY, JSON.stringify(groupPocs));
    }

    setSyncMeta({ lastPull: syncedAt });
    _setSyncStatus('synced');
    return result.data;
  } catch (err) {
    console.error('Sync pull error:', err);
    _setSyncStatus('error');
    return null;
  }
}

// ── Full push (upload all local data to Sheets) ──

async function pushAllToSheets() {
  if (!getSyncEnabled()) return false;
  _setSyncStatus('syncing');

  try {
    const allFlights = getFlights();
    const allTravelers = getTravelers();
    const hotelRatings = getHotelRatings();
    const groupPocs = getGroupPocs();

    const res = await fetch(SHEETS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'fullPush',
        data: {
          flights: allFlights,
          travelers: allTravelers,
          settings: { hotelRatings, groupPocs }
        }
      })
    });

    const result = await res.json();
    if (result.success) {
      setSyncMeta({ lastFullPush: new Date().toISOString() });
      saveSyncQueue([]); // Clear pending queue
      _setSyncStatus('synced');
      return true;
    } else {
      throw new Error(result.error || 'Full push failed');
    }
  } catch (err) {
    console.error('Full push error:', err);
    _setSyncStatus('error');
    return false;
  }
}

// ── Start periodic sync ──

function startSyncInterval() {
  if (!getSyncEnabled()) return;
  // Pull on load
  pullFromSheets();
  // Pull every 60 seconds
  _pullInterval = setInterval(() => {
    const queue = getSyncQueue();
    if (queue.length > 0) flushSyncQueue();
    else pullFromSheets();
  }, 60000);
}

function stopSyncInterval() {
  if (_pullInterval) { clearInterval(_pullInterval); _pullInterval = null; }
}

// ━━━━━━━━━━━━━━━━━━━━ UTILS ━━━━━━━━━━━━━━━━━━━━
function formatDate(ds) {
  if (!ds) return '';
  const [y, m, d] = ds.split('-');
  return `${d}/${m}/${y}`;
}

function formatDateHebrew(ds) {
  if (!ds) return '';
  const date = new Date(ds + 'T00:00:00');
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${days[date.getDay()]}, ${date.getDate()} ב${months[date.getMonth()]} ${date.getFullYear()}`;
}

function formatDateEnglish(ds) {
  if (!ds) return '';
  const date = new Date(ds + 'T00:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}

function abbreviateRank(rank) {
  if (!rank) return '';
  if (RANK_ABBREVIATIONS[rank]) return RANK_ABBREVIATIONS[rank];
  const normalized = rank.replace(/-/g, ' ');
  if (RANK_ABBREVIATIONS[normalized]) return RANK_ABBREVIATIONS[normalized];
  const hyphenated = rank.replace(/\s+/g, '-');
  if (RANK_ABBREVIATIONS[hyphenated]) return RANK_ABBREVIATIONS[hyphenated];
  return rank;
}

function phoneToWhatsApp(phone) {
  if (!phone) return '';
  const d = phone.replace(/\D/g, '');
  if (d.startsWith('0')) return '972' + d.slice(1);
  if (d.startsWith('972')) return d;
  return '972' + d;
}

function directionLabel(dir) { return dir === 'incoming' ? 'נכנסים' : 'יוצאים'; }
function directionLabelEnglish(dir) { return dir === 'incoming' ? 'Arriving' : 'Departing'; }
function directionEmoji(dir) { return dir === 'incoming' ? '🛬' : '🛫'; }

// ━━━━━━━━━━━━━━━━━━━━ WHATSAPP SUMMARY ━━━━━━━━━━━━━━━━━━━━
function generateWhatsAppSummary(flight, travelers, lang) {
  if (!flight || !travelers.length) return '';
  if (lang === 'en') return generateWhatsAppSummaryEnglish(flight, travelers);
  return generateWhatsAppSummaryHebrew(flight, travelers);
}

function generateWhatsAppSummaryHebrew(flight, travelers) {
  const total = travelers.length;
  const hakhlaka = travelers.filter(t => t.passportCheck === 'החלקה').length;
  const dir = directionLabel(flight.direction);
  const emoji = directionEmoji(flight.direction);
  let groupLines = [];
  for (const group of GROUPS) {
    const gt = travelers.filter(t => t.group === group);
    if (!gt.length) continue;
    const poc = [...gt].sort((a, b) => a.serial - b.serial)[0];
    const hotel = poc.hotel || 'לא הוגדר';
    const hotelCount = gt.filter(t => t.hotel === hotel).length;
    const rooms = Math.ceil(hotelCount / 2);
    groupLines.push(`\u2022 ${gt.length} - ${group}; POC ${poc.fullName} - ${hotel} - ${rooms} חדרים`);
  }
  return `\u2708\uFE0F *טיסה מס׳ ${flight.flightNumber}*\n\uD83D\uDCC5 תאריך: ${formatDate(flight.date)}\n\uD83D\uDD50 שעה: ${flight.time}\n\n${emoji} *${dir}: ${total} נוסעים*\n\u26A0\uFE0F החלקה: ${hakhlaka}\n\n\uD83D\uDCCB *פירוט לפי קבוצות:*\n${groupLines.join('\n')}`;
}

function generateWhatsAppSummaryEnglish(flight, travelers) {
  const total = travelers.length;
  const hakhlaka = travelers.filter(t => t.passportCheck === 'החלקה').length;
  const dir = directionLabelEnglish(flight.direction);
  const emoji = directionEmoji(flight.direction);
  let groupLines = [];
  for (const group of GROUPS) {
    const gt = travelers.filter(t => t.group === group);
    if (!gt.length) continue;
    const poc = [...gt].sort((a, b) => a.serial - b.serial)[0];
    const hotel = poc.hotel || 'N/A';
    const groupEn = GROUP_TRANSLATIONS[group] || group;
    const hotelCount = gt.filter(t => t.hotel === hotel).length;
    const rooms = Math.ceil(hotelCount / 2);
    groupLines.push(`\u2022 ${gt.length} - ${groupEn}; POC ${poc.fullName} - ${hotel} - ${rooms} rooms`);
  }
  return `\u2708\uFE0F *Flight ${flight.flightNumber}*\n\uD83D\uDCC5 Date: ${formatDate(flight.date)}\n\uD83D\uDD50 Time: ${flight.time}\n\n${emoji} *${dir}: ${total} passengers*\n\u26A0\uFE0F Bypass (Hakhlaka): ${hakhlaka}\n\n\uD83D\uDCCB *Group Breakdown:*\n${groupLines.join('\n')}`;
}

function doExportExcel(flight, travelers) {
  const data = travelers.map(t => ({
    'מס"ד': t.serial, 'גוף': t.unit, 'דרגה': t.rank, 'שם מלא': t.fullName,
    'מ.א': t.militaryId, 'ת.ז': t.nationalId, 'דרכון': t.passport, 'טלפון': t.phone,
    'קבוצה': t.group, 'מלון': t.hotel, 'הסעה הוזמנה': t.transportBooked ? 'כן' : 'לא',
    'בדיקת דרכון': t.passportCheck
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'נוסעים');
  XLSX.writeFile(wb, `טיסה_${flight.flightNumber}_${flight.date}.xlsx`);
}

function parseSmartPaste(text) {
  const r = {};
  const ex = p => { const m = text.match(p); return m ? m[1].trim() : ''; };
  r.fullName = ex(/שם:\s*(.+)/);
  r.nationalId = ex(/תז:\s*(\d+)/);
  r.phone = ex(/טלפון:\s*([\d\-]+)/);
  r.group = ex(/קבוצה:\s*(.+)/);
  r.flightDate = ex(/טיסה:\s*([\d\/\-\.]+)/);
  r.direction = ex(/כיוון:\s*(.+)/);
  if (r.flightDate) {
    const dm = r.flightDate.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if (dm) { const y = dm[3].length === 2 ? '20' + dm[3] : dm[3]; r.flightDate = `${y}-${dm[2].padStart(2, '0')}-${dm[1].padStart(2, '0')}`; }
  }
  if (r.direction) {
    if (r.direction.includes('נכנס') || r.direction.includes('מגיע') || r.direction.includes('incoming')) r.direction = 'incoming';
    else if (r.direction.includes('יוצ') || r.direction.includes('עוזב') || r.direction.includes('outgoing')) r.direction = 'outgoing';
  }
  return r;
}

// ━━━━━━━━━━━━━━━━━━━━ TOAST SYSTEM ━━━━━━━━━━━━━━━━━━━━
let toastList = [];
let toastListeners = [];
function showToast(msg, type = 'success') {
  const id = Date.now() + Math.random();
  toastList = [...toastList, { id, msg, type }];
  toastListeners.forEach(fn => fn([...toastList]));
  setTimeout(() => { toastList = toastList.filter(t => t.id !== id); toastListeners.forEach(fn => fn([...toastList])); }, 3500);
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => { toastListeners.push(setToasts); return () => { toastListeners = toastListeners.filter(f => f !== setToasts); }; }, []);
  const icons = { success: 'bi-check-circle-fill text-green-400', error: 'bi-x-circle-fill text-red-400', info: 'bi-info-circle-fill text-blue-400' };
  const bgs = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
  return (
    <div className="fixed bottom-4 left-4 z-[100] flex flex-col gap-2">
      {toasts.map(t => (
        <div key={t.id} className={`toast-anim flex items-center gap-2 px-4 py-3 rounded-xl text-white shadow-xl text-sm max-w-xs ${bgs[t.type] || bgs.success}`}>
          <i className={`bi ${icons[t.type] || icons.success}`}></i>
          <span className="flex-1">{t.msg}</span>
          <button onClick={() => { toastList = toastList.filter(x => x.id !== t.id); toastListeners.forEach(fn => fn([...toastList])); }} className="opacity-70 hover:opacity-100">
            <i className="bi bi-x-lg text-xs"></i>
          </button>
        </div>
      ))}
    </div>
  );
}

function FlightSection({ flight, travelers, hotelRatings, onHotelClick }) {
  const [filterGroup, setFilterGroup] = useState('');
  const [searchQ, setSearchQ] = useState('');
  const [sortCol, setSortCol] = useState('serial');
  const [sortDir, setSortDir] = useState('asc');
  const [showWA, setShowWA] = useState(false);
  const [exporting, setExporting] = useState(false);

  const toggleSort = col => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir('asc'); } };

  const filtered = useMemo(() => {
    let d = [...travelers];
    if (filterGroup) d = d.filter(t => t.group === filterGroup);
    if (searchQ) { const q = searchQ.toLowerCase(); d = d.filter(t => t.fullName?.toLowerCase().includes(q) || t.unit?.toLowerCase().includes(q) || t.hotel?.toLowerCase().includes(q) || t.nationalId?.includes(q) || t.militaryId?.includes(q)); }
    d.sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
      const cmp = String(va).localeCompare(String(vb), 'he');
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return d;
  }, [travelers, filterGroup, searchQ, sortCol, sortDir]);

  const Th = ({ children, col, cls = '' }) => (
    <th className={`px-3 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 whitespace-nowrap select-none ${col ? 'cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700' : ''} ${cls}`}
      onClick={col ? () => toggleSort(col) : undefined}>
      <div className="flex items-center justify-center gap-0.5">
        {children}

      </div>

  const handleExport = () => {
    setExporting(true);
    try { doExportExcel(flight, filtered); showToast('הקובץ יוצא בהצלחה!'); } catch { showToast('שגיאה בייצוא', 'error'); }

  return (

      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div className="flex items-center gap-3">

            <i className={`bi bi-airplane text-lg ${flight.direction === 'incoming' ? 'text-green-600 dark:text-green-400' : 'text-blue-600 dark:text-blue-400'}`} style={flight.direction === 'incoming' ? { transform: 'scaleX(-1)' } : {}}></i>
          </div>
          <div>
            <div className="flex items-center gap-2">
              <h2 className="text-xl font-bold text-gray-900 dark:text-white">טיסה {flight.flightNumber}</h2>
              <span className={`text-xs px-2.5 py-1 rounded-full font-medium ${flight.direction === 'incoming' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}`}>
                {directionEmoji(flight.direction)} {directionLabel(flight.direction)}
              </span>
            </div>
            <p className="text-sm text-gray-500 dark:text-gray-400">{formatDateHebrew(flight.date)} &bull; {flight.time}</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={handleExport} disabled={exporting} className="flex items-center gap-1.5 px-3.5 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm transition-all disabled:opacity-60">
            <i className="bi bi-download text-indigo-500"></i> {exporting ? 'מייצא...' : 'ייצוא לאקסל'}
          </button>
          <button onClick={() => setShowWA(true)} className="flex items-center gap-1.5 px-3.5 py-2 bg-green-500 hover:bg-green-600 text-white rounded-xl text-sm font-medium shadow-sm transition-all">
            <i className="bi bi-whatsapp"></i> הפק סיכום לווטסאפ
          </button>
        </div>
      </div>

      <HotelAnalytics travelers={travelers} hotelRatings={hotelRatings} onHotelClick={onHotelClick} />

      {/* Filters */}
      <div className="flex flex-wrap items-center gap-3 mb-3">
        <div className="relative flex-1 min-w-[200px]">
          <i className="bi bi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input type="text" placeholder="חיפוש..." value={searchQ} onChange={e => setSearchQ(e.target.value)}
            className="w-full pr-9 pl-3 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400" />
        </div>
        <div className="flex items-center gap-2">
          <i className="bi bi-funnel text-gray-400 text-sm"></i>
          <select value={filterGroup} onChange={e => setFilterGroup(e.target.value)}
            className="text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 focus:outline-none focus:border-indigo-400">
            <option value="">כל הקבוצות</option>
            {GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
          </select>
          {(filterGroup || searchQ) && <button onClick={() => { setFilterGroup(''); setSearchQ(''); }} className="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"><i className="bi bi-x-lg text-gray-400 text-xs"></i></button>}
        </div>
        <span className="text-sm text-gray-500 dark:text-gray-400 mr-auto">{filtered.length} מתוך {travelers.length} נוסעים</span>
      </div>

      {/* READ-ONLY Table - no מס"ד column */}
      <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="min-w-full">
            <thead>
              <tr>
                <Th col="unit">גוף</Th>
                <Th col="rank">דרגה</Th>
                <Th col="fullName">שם מלא</Th>
                <Th col="militaryId">מ.א</Th>
                <Th col="nationalId">ת.ז</Th>
                <Th col="passport">דרכון</Th>
                <Th>טלפון</Th>
                <Th col="group">קבוצה</Th>
                <Th col="hotel">מלון</Th>
                <Th col="transportBooked">הסעה</Th>
                <Th>בדיקת דרכון</Th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan={11} className="text-center py-12 text-gray-400"><i className="bi bi-people text-3xl block mb-2 opacity-30"></i><p>לא נמצאו נוסעים</p></td></tr>
              ) : filtered.map((t, i) => {
                const gc = GROUP_COLORS[t.group] || {};
                return (
                  <tr key={t.id} className={`border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors ${i % 2 !== 0 ? 'bg-gray-50/30 dark:bg-gray-800/20' : ''}`}>

                    <td className="px-3 py-2.5 text-sm text-center whitespace-nowrap">{abbreviateRank(t.rank)}</td>
                    <td className="px-3 py-2.5 text-sm font-medium whitespace-nowrap">{t.fullName}</td>
                    <td className="px-3 py-2.5 text-sm text-center font-mono">{t.militaryId}</td>
                    <td className="px-3 py-2.5 text-sm text-center font-mono">{t.nationalId}</td>
                    <td className="px-3 py-2.5 text-sm text-center font-mono">{t.passport}</td>
                    <td className="px-3 py-2.5 text-sm text-center">
                      <a href={`https://wa.me/${phoneToWhatsApp(t.phone)}`} target="_blank" rel="noopener noreferrer" className="text-green-600 dark:text-green-400 hover:underline font-mono text-xs">{t.phone}</a>
                    </td>
                    <td className="px-3 py-2.5 text-sm">
                      <span className={`text-xs px-2 py-1 rounded-full border font-medium whitespace-nowrap ${gc.bg} ${gc.text} ${gc.border}`}>{t.group}</span>
                    </td>
                    <td className="px-3 py-2.5 text-sm">{t.hotel || <span className="text-gray-400">{'\u2014'}</span>}</td>
                    <td className="px-3 py-2.5 text-center text-sm">{t.transportBooked ? '\u2713' : '\u2014'}</td>
                    <td className="px-3 py-2.5 text-center">
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${t.passportCheck === 'V' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}`}>
                        {t.passportCheck === 'V' ? '\u2713 V' : 'החלקה'}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <FlightFooter flight={flight} travelers={filtered} />
      </div>
      {showWA && <WhatsAppModal flight={flight} travelers={travelers} onClose={() => setShowWA(false)} />}
    </div>
  );
}

function DashboardPage() {
  const [flights, setFlights] = useState([]);
  const [travelersMap, setTravelersMap] = useState({});
  const [allTodayTravelers, setAllTodayTravelers] = useState([]);
  const [hotelRatings, setHotelRatings] = useState({});
  const [groupPocs, setGroupPocs] = useState({});
  const [loading, setLoading] = useState(true);
  const [refreshKey, setRefreshKey] = useState(0);
  const [selectedHotel, setSelectedHotel] = useState(null);

  useEffect(() => {
    const todaysFlights = getTodaysFlights();
    setFlights(todaysFlights);
    const map = {};
    let allT = [];
    todaysFlights.forEach(f => {
      const t = getTravelersForFlight(f.id);
      map[f.id] = t;
      allT = [...allT, ...t];
    });
    setTravelersMap(map);
    setAllTodayTravelers(allT);
    setHotelRatings(getHotelRatings());
    setGroupPocs(getGroupPocs());
    setLoading(false);
  }, [refreshKey]);

  const refresh = () => setRefreshKey(k => k + 1);

  const allHotels = useMemo(() => {
    const s = new Set(allTodayTravelers.map(t => t.hotel).filter(Boolean));
    return [...s].sort();
  }, [allTodayTravelers]);

  if (loading) return (
    <div className="flex items-center justify-center h-screen">
      <div className="flex flex-col items-center gap-3 text-gray-400"><i className="bi bi-airplane text-4xl anim-bounce"></i><p>טוען נתונים...</p></div>
    </div>
  );

  return (
    <div className="p-6 max-w-[1600px] mx-auto">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <i className="bi bi-airplane-fill text-indigo-600 text-2xl"></i> מרכז בקרת טיסות
          </h1>
          <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">
            {flights.length > 0 ? `${flights.length} טיסות מתוכננות להיום` : 'אין טיסות מתוכננות להיום'}
          </p>
        </div>
        <button onClick={refresh} className="flex items-center gap-1.5 px-3.5 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm transition-all">
          <i className="bi bi-arrow-clockwise"></i> רענן
        </button>
      </div>

      {allTodayTravelers.length > 0 && <GroupSummaryCards allTravelers={allTodayTravelers} pocs={groupPocs} />}

      {flights.length === 0 && (
        <div className="text-center py-24 text-gray-400 dark:text-gray-600">
          <i className="bi bi-airplane text-6xl block mb-4 opacity-20"></i>
          <h3 className="text-xl font-semibold mb-2">אין טיסות להיום</h3>
          <p className="text-sm">לא נמצאו טיסות מתוכננות לתאריך הנוכחי</p>
        </div>
      )}

      {flights.map(f => (
        <FlightSection key={f.id} flight={f} travelers={travelersMap[f.id] || []} hotelRatings={hotelRatings} onHotelClick={setSelectedHotel} />
      ))}

      {selectedHotel && (
        <HotelDetailModal hotel={selectedHotel} allTravelers={allTodayTravelers} allHotels={allHotels} hotelRatings={hotelRatings} onChangeHotel={setSelectedHotel} onClose={() => setSelectedHotel(null)} />
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━ ADD TRAVELER PAGE ━━━━━━━━━━━━━━━━━━━━

function AddPage({ onNavigate }) {
  const [tab, setTab] = useState('manual');
  const EMPTY = { unit: '', rank: '', fullName: '', militaryId: '', nationalId: '', passport: '', phone: '', group: GROUPS[0], hotel: '', transportBooked: false, passportCheck: 'V', flightId: '' };
  const [form, setForm] = useState(EMPTY);
  const [errors, setErrors] = useState({});
  const [flights, setFlights] = useState([]);
  const [pasteText, setPasteText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [saving, setSaving] = useState(false);
  const [newFlightMode, setNewFlightMode] = useState(false);
  const [nf, setNf] = useState({ flightNumber: '', date: '', time: '', direction: 'outgoing' });

  useEffect(() => {
    const f = getFlights();
    setFlights(f);
    if (f.length > 0) setForm(p => ({ ...p, flightId: f[0].id }));
  }, []);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const validate = () => {
    const e = {};
    if (!form.fullName.trim()) e.fullName = 'שדה חובה';
    if (!form.flightId && !newFlightMode) e.flightId = 'בחר טיסה';
    if (newFlightMode && !nf.flightNumber) e.flightNumber = 'חובה';
    if (newFlightMode && !nf.date) e.date = 'חובה';
    if (newFlightMode && !nf.time) e.time = 'חובה';
    setErrors(e);
    return !Object.keys(e).length;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!validate()) return;
    setSaving(true);
    try {
      let flightId = form.flightId;
      if (newFlightMode) {
        const created = addFlightToStorage(nf);
        flightId = created.id;
      }
      addTravelerToStorage({ ...form, flightId });
      showToast('הנוסע נוסף בהצלחה!');
      setForm(EMPTY); setErrors({});
      setTimeout(() => onNavigate('dashboard'), 1200);
    } catch { showToast('שגיאה בשמירה', 'error'); }
    setSaving(false);
  };

  const handleParse = () => {
    const r = parseSmartPaste(pasteText);
    if (!r.fullName && !r.nationalId) { showToast('לא ניתן לנתח. ודא מילות מפתח.', 'error'); return; }
    let fid = form.flightId;
    if (r.flightDate) { const m = flights.find(f => f.date === r.flightDate); if (m) fid = m.id; }
    setParsed({ ...EMPTY, ...r, flightId: fid });
    showToast('הנתונים נותחו!');
  };

  const inputCls = (name) => `w-full px-3 py-2.5 text-sm bg-white dark:bg-gray-800 border rounded-xl focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400/30 transition ${errors[name] ? 'border-red-400' : 'border-gray-200 dark:border-gray-700'}`;

  const Input = ({ name, ...props }) => (
    <input value={form[name]} onChange={e => set(name, e.target.value)} className={inputCls(name)} {...props} />
  );

  const Field = ({ label, name, req, children }) => (
    <div>
      <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{label} {req && <span className="text-red-500">*</span>}</label>
      {children}
      {errors[name] && <p className="mt-1 text-xs text-red-500 flex items-center gap-1"><i className="bi bi-exclamation-circle text-[10px]"></i> {errors[name]}</p>}
    </div>
  );

  return (
    <div className="p-6 max-w-3xl mx-auto fade-in">
      <div className="mb-8">
        <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2"><i className="bi bi-person-plus-fill text-indigo-600"></i> הוסף נוסע</h1>
        <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">הוסף נוסע ידנית או הדבק טקסט לניתוח אוטומטי</p>
      </div>

      <div className="flex gap-1 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl mb-6 w-fit">
        {[{ id: 'manual', icon: 'bi-person-plus', label: 'הוספה ידנית' }, { id: 'paste', icon: 'bi-clipboard', label: 'הדבקה חכמה' }].map(({ id, icon, label }) => (
          <button key={id} onClick={() => setTab(id)}
            className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${tab === id ? 'bg-white dark:bg-gray-900 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>
            <i className={`bi ${icon}`}></i> {label}
          </button>
        ))}
      </div>

      {tab === 'manual' && (
        <form onSubmit={handleSubmit} className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-6">
          <div className="mb-6 p-4 bg-indigo-50 dark:bg-indigo-950/30 rounded-xl border border-indigo-100 dark:border-indigo-900">
            <h3 className="font-semibold text-gray-800 dark:text-gray-200 mb-3 flex items-center gap-2"><i className="bi bi-airplane text-indigo-500"></i> בחירת טיסה</h3>
            {!newFlightMode ? (
              <Field label="טיסה" name="flightId" req>
                <div className="flex gap-2">
                  <select value={form.flightId} onChange={e => set('flightId', e.target.value)}
                    className={`flex-1 px-3 py-2.5 text-sm bg-white dark:bg-gray-800 border rounded-xl focus:outline-none focus:border-indigo-400 ${errors.flightId ? 'border-red-400' : 'border-gray-200 dark:border-gray-700'}`}>
                    <option value="">בחר טיסה...</option>
                    {flights.map(f => <option key={f.id} value={f.id}>{f.flightNumber} - {formatDate(f.date)} {f.time} ({directionLabel(f.direction)})</option>)}
                  </select>
                  <button type="button" onClick={() => setNewFlightMode(true)} className="px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 whitespace-nowrap">+ טיסה חדשה</button>
                </div>
              </Field>
            ) : (
              <div>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <div><label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">מס׳ טיסה *</label><input value={nf.flightNumber} onChange={e => setNf(p => ({ ...p, flightNumber: e.target.value }))} className="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 focus:outline-none focus:border-indigo-400" placeholder="TK1234" /></div>
                  <div><label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">כיוון</label><select value={nf.direction} onChange={e => setNf(p => ({ ...p, direction: e.target.value }))} className="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800"><option value="outgoing">יוצאים</option><option value="incoming">נכנסים</option></select></div>
                  <div><label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">תאריך *</label><input type="date" value={nf.date} onChange={e => setNf(p => ({ ...p, date: e.target.value }))} className="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 focus:outline-none" /></div>
                  <div><label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">שעה *</label><input type="time" value={nf.time} onChange={e => setNf(p => ({ ...p, time: e.target.value }))} className="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 focus:outline-none" /></div>
                </div>
                <button type="button" onClick={() => setNewFlightMode(false)} className="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">{'\u2190'} חזור לבחירת טיסה קיימת</button>
              </div>
            )}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Field label="שם מלא" name="fullName" req><Input name="fullName" placeholder="ישראל ישראלי" /></Field>
            <Field label="דרגה" name="rank">
              <input value={form.rank} onChange={e => set('rank', e.target.value)} list="rl"
                className="w-full px-3 py-2.5 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400" placeholder="בחר או הקלד דרגה" />
              <datalist id="rl">{RANKS.map(r => <option key={r} value={r} />)}</datalist>
            </Field>
            <Field label="גוף" name="unit"><Input name="unit" placeholder='8200, אמ"ן...' /></Field>
            <Field label="מ.א (מספר אישי)" name="militaryId"><Input name="militaryId" placeholder="7123456" /></Field>
            <Field label="ת.ז (תעודת זהות)" name="nationalId"><Input name="nationalId" placeholder="012345678" /></Field>
            <Field label="דרכון" name="passport"><Input name="passport" placeholder="P1234567" /></Field>
            <Field label="טלפון" name="phone"><Input name="phone" placeholder="052-1234567" type="tel" /></Field>
            <Field label="קבוצה" name="group">
              <select value={form.group} onChange={e => set('group', e.target.value)}
                className="w-full px-3 py-2.5 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400">
                {GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
              </select>
            </Field>
            <Field label="מלון" name="hotel"><Input name="hotel" placeholder="Shangri-La, W..." /></Field>
            <div className="sm:col-span-2 flex flex-wrap gap-6 items-center">
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={form.transportBooked} onChange={e => set('transportBooked', e.target.checked)} className="w-4 h-4 accent-indigo-600 rounded" />
                <span className="text-sm font-medium text-gray-700 dark:text-gray-300">הסעה הוזמנה</span>
              </label>
              <div className="flex items-center gap-3">
                <span className="text-sm font-medium text-gray-700 dark:text-gray-300">בדיקת דרכון:</span>
                <PassportSwitch value={form.passportCheck} onChange={v => set('passportCheck', v)} />
                <span className={`text-sm font-medium ${form.passportCheck === 'V' ? 'text-green-600' : 'text-blue-600'}`}>{form.passportCheck === 'V' ? '\u2713 V' : 'החלקה'}</span>
              </div>
            </div>
          </div>

          <button type="submit" disabled={saving}
            className="mt-6 w-full flex items-center justify-center gap-2 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white rounded-xl font-semibold transition-all shadow-sm">
            {saving ? <span className="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full spin"></span> : <i className="bi bi-person-plus"></i>}
            {saving ? 'שומר...' : 'הוסף נוסע'}
          </button>
        </form>
      )}

      {tab === 'paste' && (
        <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-6">
          <div className="mb-4">
            <h3 className="font-semibold text-gray-800 dark:text-gray-200 mb-1">הדבק טקסט לניתוח</h3>
            <p className="text-sm text-gray-500 dark:text-gray-400 mb-2">המערכת תנתח טקסט המכיל מילות מפתח:</p>
            <div className="flex flex-wrap gap-2">
              {['שם:', 'תז:', 'טלפון:', 'קבוצה:', 'טיסה:', 'כיוון:'].map(k => (
                <code key={k} className="text-xs bg-gray-100 dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded-lg">{k}</code>
              ))}
            </div>
          </div>
          <textarea value={pasteText} onChange={e => setPasteText(e.target.value)}
            placeholder={`שם: ישראל ישראלי\nתז: 012345678\nטלפון: 0521234567\nקבוצה: כיפה\nטיסה: 27/03/2026\nכיוון: יוצאים`}
            className="w-full h-48 px-4 py-3 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400 font-mono leading-relaxed resize-none" dir="rtl" />
          <button onClick={handleParse} disabled={!pasteText.trim()}
            className="mt-3 flex items-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white rounded-xl font-semibold text-sm transition-all">
            <i className="bi bi-magic"></i> נתח טקסט
          </button>

          {parsed && (
            <div className="mt-6 p-4 bg-green-50 dark:bg-green-950/30 border border-green-200 dark:border-green-900 rounded-xl fade-in">
              <h4 className="font-semibold text-green-800 dark:text-green-300 mb-3 flex items-center gap-2"><i className="bi bi-check-circle-fill"></i> תוצאות ניתוח</h4>
              <div className="grid grid-cols-2 gap-2 text-sm">
                {[['שם מלא', parsed.fullName], ['ת.ז', parsed.nationalId], ['טלפון', parsed.phone], ['קבוצה', parsed.group], ['תאריך טיסה', parsed.flightDate ? formatDate(parsed.flightDate) : ''], ['כיוון', parsed.direction === 'incoming' ? 'נכנסים' : parsed.direction === 'outgoing' ? 'יוצאים' : parsed.direction]].map(([l, v]) => v ? (
                  <div key={l} className="flex gap-2"><span className="text-gray-500 dark:text-gray-400 shrink-0">{l}:</span><span className="font-medium text-gray-900 dark:text-gray-100">{v}</span></div>
                ) : null)}
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={() => { setForm(parsed); setTab('manual'); setParsed(null); setPasteText(''); }}
                  className="flex items-center gap-2 px-5 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-semibold">
                  <i className="bi bi-check-lg"></i> אשר ועבור לטופס
                </button>
                <button onClick={() => setParsed(null)} className="px-5 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700">ביטול</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━ EDIT & MANAGE PAGE ━━━━━━━━━━━━━━━━━━━━

function EditPage() {
  const [flights, setFlights] = useState([]);
  const [selectedFlight, setSelectedFlight] = useState(null);
  const [travelers, setTravelers] = useState([]);
  const [hotelRatings, setHotelRatingsState] = useState({});
  const [filterGroup, setFilterGroup] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [sortCol, setSortCol] = useState('serial');
  const [sortDir, setSortDir] = useState('asc');
  const [confirmDeleteFlight, setConfirmDeleteFlight] = useState(false);
  const [confirmDeleteTraveler, setConfirmDeleteTraveler] = useState(null);
  const [loading, setLoading] = useState(true);
  const [refreshKey, setRefreshKey] = useState(0);

  useEffect(() => {
    const all = getFlights();
    setFlights(all);
    setHotelRatingsState(getHotelRatings());
    if (all.length > 0 && !selectedFlight) setSelectedFlight(all[0].id);
    setLoading(false);
  }, [refreshKey]);

  useEffect(() => {
    if (selectedFlight) setTravelers(getTravelersForFlight(selectedFlight));
    else setTravelers([]);
  }, [selectedFlight, refreshKey]);

  const flight = flights.find(f => f.id === selectedFlight);
  const refresh = () => setRefreshKey(k => k + 1);

  const handleUpdate = (id, field, value) => {
    setTravelers(prev => prev.map(t => t.id === id ? { ...t, [field]: value } : t));
    updateTravelerInStorage(id, { [field]: value });
  };

  const handleDeleteTraveler = (id) => {
    deleteTravelerFromStorage(id);
    setConfirmDeleteTraveler(null);
    showToast('הנוסע הועבר לארכיון');
    refresh();
  };

  const handleDeleteFlight = () => {
    if (!selectedFlight) return;
    deleteFlightFromStorage(selectedFlight);
    setConfirmDeleteFlight(false);
    setSelectedFlight(null);
    showToast('הטיסה נמחקה בהצלחה');
    refresh();
  };

  const handleRateHotel = (hotel, rating) => {
    setHotelRatingInStorage(hotel, rating);
    setHotelRatingsState(prev => ({ ...prev, [hotel]: rating }));
    showToast(`דירוג ${hotel} עודכן ל-${rating} כוכבים`);
  };

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const filtered = useMemo(() => {
    let data = [...travelers];
    if (filterGroup) data = data.filter(t => t.group === filterGroup);
    if (searchQuery) { const q = searchQuery.toLowerCase(); data = data.filter(t => t.fullName?.toLowerCase().includes(q) || t.unit?.toLowerCase().includes(q) || t.hotel?.toLowerCase().includes(q) || t.nationalId?.includes(q)); }
    data.sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
      return sortDir === 'asc' ? String(va).localeCompare(String(vb), 'he') : String(vb).localeCompare(String(va), 'he');
    });
    return data;
  }, [travelers, filterGroup, searchQuery, sortCol, sortDir]);

  const uniqueHotels = useMemo(() => {
    const s = new Set(travelers.map(t => t.hotel).filter(Boolean));
    return [...s].sort();
  }, [travelers]);

  const Th = ({ children, col }) => (
    <th className={`px-3 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800 select-none ${col ? 'cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700' : ''}`}
      onClick={col ? () => handleSort(col) : undefined}>
      <div className="flex items-center justify-center gap-1">
        {children}
        {col && <i className={`bi ${sortCol === col ? (sortDir === 'asc' ? 'bi-chevron-up' : 'bi-chevron-down') : 'bi-arrow-down-up'} text-[9px] ${sortCol === col ? 'opacity-100' : 'opacity-40'}`}></i>}
      </div>
    </th>
  );

  if (loading) return <div className="flex items-center justify-center h-screen"><i className="bi bi-airplane text-4xl text-gray-400 anim-bounce"></i></div>;

  return (
    <div className="p-6 max-w-[1600px] mx-auto fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2"><i className="bi bi-pencil-fill text-indigo-600"></i> עריכה וניהול</h1>
          <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">עריכת פרטי נוסעים, ניהול מלונות וטיסות</p>
        </div>
        <button onClick={refresh} className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
          <i className="bi bi-arrow-clockwise"></i> רענן
        </button>
      </div>

      {/* Flight Selector */}
      <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-4 mb-6">
        <div className="flex flex-wrap items-center gap-4">
          <div className="flex items-center gap-2 flex-1 min-w-[240px]">
            <i className="bi bi-airplane text-indigo-500"></i>
            <select value={selectedFlight || ''} onChange={e => setSelectedFlight(e.target.value)}
              className="flex-1 px-3 py-2.5 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400">
              <option value="">בחר טיסה...</option>
              {flights.map(f => <option key={f.id} value={f.id}>{f.flightNumber} {'\u2014'} {formatDate(f.date)} {f.time} ({directionLabel(f.direction)})</option>)}
            </select>
          </div>
          {flight && (
            <div className="flex items-center gap-2">
              <span className={`text-xs px-2.5 py-1 rounded-full font-medium ${flight.direction === 'incoming' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}`}>
                {directionEmoji(flight.direction)} {directionLabel(flight.direction)}
              </span>
              <button onClick={() => setConfirmDeleteFlight(true)}
                className="flex items-center gap-1.5 px-3 py-2 bg-red-50 dark:bg-red-950/30 hover:bg-red-100 dark:hover:bg-red-900/40 text-red-600 dark:text-red-400 rounded-xl text-sm font-medium transition-all border border-red-200 dark:border-red-800">
                <i className="bi bi-trash text-xs"></i> מחק טיסה
              </button>
            </div>
          )}
        </div>
      </div>

      {!selectedFlight && (
        <div className="text-center py-20 text-gray-400 dark:text-gray-600">
          <i className="bi bi-pencil text-5xl block mb-3 opacity-30"></i>
          <h3 className="text-lg font-semibold mb-1">בחר טיסה לעריכה</h3>
          <p className="text-sm">בחר טיסה מהרשימה למעלה כדי לערוך את הנוסעים שלה</p>
        </div>
      )}

      {selectedFlight && flight && (
        <>
          {/* Hotel Security Ratings - Editable */}
          {uniqueHotels.length > 0 && (
            <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-4 mb-6">
              <h3 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2">
                <i className="bi bi-building text-indigo-500"></i> דירוג אבטחת מלונות
              </h3>
              <div className="flex flex-wrap gap-4">
                {uniqueHotels.map(hotel => (
                  <div key={hotel} className="flex items-center gap-3 bg-gray-50 dark:bg-gray-800 px-4 py-2.5 rounded-xl border border-gray-100 dark:border-gray-700">
                    <span className="text-sm font-medium text-gray-800 dark:text-gray-200">{hotel}</span>
                    <EditableStarRating hotel={hotel} ratings={hotelRatings} onRate={handleRateHotel} />
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Group POCs - Editable */}
          <EditableGroupPocs />


          {/* Filters */}
          <div className="flex flex-wrap items-center gap-3 mb-3">
            <div className="relative flex-1 min-w-[200px]">
              <i className="bi bi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
              <input type="text" placeholder="חיפוש..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                className="w-full pr-9 pl-3 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-indigo-400" />
            </div>
            <div className="flex items-center gap-2">
              <i className="bi bi-funnel text-gray-400 text-sm"></i>
              <select value={filterGroup} onChange={e => setFilterGroup(e.target.value)}
                className="text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 focus:outline-none focus:border-indigo-400">
                <option value="">כל הקבוצות</option>
                {GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
              </select>
              {(filterGroup || searchQuery) && <button onClick={() => { setFilterGroup(''); setSearchQuery(''); }} className="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"><i className="bi bi-x-lg text-gray-400 text-xs"></i></button>}
            </div>
            <span className="text-sm text-gray-500 dark:text-gray-400 mr-auto">{filtered.length} נוסעים</span>
          </div>

          {/* Editable Table with מס"ד and Actions */}
          <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="min-w-full">
                <thead>
                  <tr>
                    <Th col="serial">מס"ד</Th>
                    <Th col="unit">גוף</Th>
                    <Th col="rank">דרגה</Th>
                    <Th col="fullName">שם מלא</Th>
                    <Th col="militaryId">מ.א</Th>
                    <Th col="nationalId">ת.ז</Th>
                    <Th col="passport">דרכון</Th>
                    <Th>טלפון</Th>
                    <Th col="group">קבוצה</Th>
                    <Th col="hotel">מלון</Th>
                    <Th col="transportBooked">הסעה</Th>
                    <Th>בדיקת דרכון</Th>
                    <Th>פעולות</Th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan={13} className="text-center py-12 text-gray-400 dark:text-gray-600"><i className="bi bi-people text-3xl block mb-2 opacity-30"></i><p>לא נמצאו נוסעים</p></td></tr>
                  ) : filtered.map((t, idx) => (
                    <tr key={t.id} className={`border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors ${idx % 2 !== 0 ? 'bg-gray-50/30 dark:bg-gray-800/20' : ''}`}>
                      <td className="px-3 py-2.5 text-center text-sm font-mono text-gray-500">{t.serial}</td>
                      <td className="px-3 py-2.5 text-sm text-center">{t.unit}</td>
                      <td className="px-3 py-2.5 text-sm text-center whitespace-nowrap">{abbreviateRank(t.rank)}</td>
                      <td className="px-3 py-2.5 text-sm font-medium whitespace-nowrap">{t.fullName}</td>
                      <td className="px-3 py-2.5 text-sm text-center font-mono">{t.militaryId}</td>
                      <td className="px-3 py-2.5 text-sm text-center font-mono">{t.nationalId}</td>
                      <td className="px-3 py-2.5 text-sm text-center font-mono">{t.passport}</td>
                      <td className="px-3 py-2.5 text-sm text-center">
                        <a href={`https://wa.me/${phoneToWhatsApp(t.phone)}`} target="_blank" rel="noopener noreferrer" className="text-green-600 dark:text-green-400 hover:underline font-mono text-xs">{t.phone}</a>
                      </td>
                      <td className="px-3 py-2.5 text-sm"><GroupDropdown value={t.group} onChange={val => handleUpdate(t.id, 'group', val)} /></td>
                      <td className="px-3 py-2.5 text-sm min-w-[100px]"><HotelCell value={t.hotel} onChange={val => handleUpdate(t.id, 'hotel', val)} /></td>
                      <td className="px-3 py-2.5 text-center">
                        <input type="checkbox" checked={t.transportBooked} onChange={e => handleUpdate(t.id, 'transportBooked', e.target.checked)} className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                      </td>
                      <td className="px-3 py-2.5"><div className="flex justify-center"><PassportSwitch value={t.passportCheck} onChange={val => handleUpdate(t.id, 'passportCheck', val)} /></div></td>
                      <td className="px-3 py-2.5 text-center">
                        <button onClick={() => setConfirmDeleteTraveler(t)} className="p-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all" title="העבר לארכיון">
                          <i className="bi bi-trash"></i>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {/* Delete Flight Modal */}
      {confirmDeleteFlight && flight && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in" onClick={() => setConfirmDeleteFlight(false)}>
          <div className="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-gray-200 dark:border-gray-700" onClick={e => e.stopPropagation()}>
            <div className="flex items-start gap-3 mb-4">
              <div className="p-2 bg-red-100 dark:bg-red-900/30 rounded-xl"><i className="bi bi-exclamation-triangle-fill text-red-600"></i></div>
              <div>
                <h3 className="font-bold text-gray-900 dark:text-white">מחיקת טיסה</h3>
                <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">האם למחוק את טיסה <b>{flight.flightNumber}</b> ({formatDate(flight.date)})? כל הנוסעים יועברו לארכיון.</p>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={handleDeleteFlight} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold text-sm">מחק טיסה</button>
              <button onClick={() => setConfirmDeleteFlight(false)} className="flex-1 py-2.5 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl font-semibold text-sm">ביטול</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Traveler Modal */}
      {confirmDeleteTraveler && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in" onClick={() => setConfirmDeleteTraveler(null)}>
          <div className="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-gray-200 dark:border-gray-700" onClick={e => e.stopPropagation()}>
            <div className="flex items-start gap-3 mb-4">
              <div className="p-2 bg-amber-100 dark:bg-amber-900/30 rounded-xl"><i className="bi bi-exclamation-triangle-fill text-amber-600"></i></div>
              <div>
                <h3 className="font-bold text-gray-900 dark:text-white">העברה לארכיון</h3>
                <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">האם להעביר את <b>{confirmDeleteTraveler.fullName}</b> לארכיון? ניתן לשחזר אותו מדף הארכיון.</p>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => handleDeleteTraveler(confirmDeleteTraveler.id)} className="flex-1 py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-semibold text-sm">העבר לארכיון</button>
              <button onClick={() => setConfirmDeleteTraveler(null)} className="flex-1 py-2.5 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl font-semibold text-sm">ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━ ARCHIVE PAGE ━━━━━━━━━━━━━━━━━━━━

function ArchivePage() {
  const [travelers, setTravelers] = useState([]);
  const [flights, setFlights] = useState([]);
  const [search, setSearch] = useState('');
  const [filterFlight, setFilterFlight] = useState('');
  const [filterHotel, setFilterHotel] = useState('');
  const [confirmDel, setConfirmDel] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = () => {
    const all = getTravelers();
    setTravelers(all.filter(t => t.isArchived));
    setFlights(getFlights());
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const flightMap = useMemo(() => { const m = {}; flights.forEach(f => { m[f.id] = f; }); return m; }, [flights]);
  const hotels = useMemo(() => [...new Set(travelers.map(t => t.hotel).filter(Boolean))].sort(), [travelers]);

  const filtered = useMemo(() => {
    let d = [...travelers];
    if (filterFlight) d = d.filter(t => t.flightId === filterFlight);
    if (filterHotel) d = d.filter(t => t.hotel === filterHotel);
    if (search) { const q = search.toLowerCase(); d = d.filter(t => t.fullName?.toLowerCase().includes(q) || t.nationalId?.includes(q) || t.militaryId?.includes(q) || t.hotel?.toLowerCase().includes(q) || flightMap[t.flightId]?.date?.includes(search)); }
    return d.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }, [travelers, search, filterFlight, filterHotel, flightMap]);

  const restore = id => {
    restoreTravelerInStorage(id);
    showToast('הנוסע שוחזר בהצלחה');
    load();
  };
  const permDelete = id => {
    permanentDeleteTraveler(id);
    setConfirmDel(null);
    showToast('הנוסע נמחק לצמיתות', 'info');
    load();
  };

  return (
    <div className="p-6 max-w-6xl mx-auto fade-in">
      <div className="mb-8">
        <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2"><i className="bi bi-archive-fill text-indigo-600"></i> ארכיון</h1>
        <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">נוסעים שהוסרו מטיסות פעילות</p>
      </div>

      <div className="grid grid-cols-3 gap-4 mb-6">
        <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
          <div className="text-2xl font-bold text-gray-900 dark:text-white">{travelers.length}</div><div className="text-sm text-gray-500 dark:text-gray-400 mt-1">נוסעים בארכיון</div>
        </div>
        <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
          <div className="text-2xl font-bold text-gray-900 dark:text-white">{new Set(travelers.map(t => t.flightId)).size}</div><div className="text-sm text-gray-500 dark:text-gray-400 mt-1">טיסות שונות</div>
        </div>
        <div className="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
          <div className="text-2xl font-bold text-gray-900 dark:text-white">{hotels.length}</div><div className="text-sm text-gray-500 dark:text-gray-400 mt-1">מלונות שונים</div>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 mb-5">
        <div className="relative flex-1 min-w-[200px]">
          <i className="bi bi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>

                    </tr>

      {confirmDel && (

          <div className="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-gray-200 dark:border-gray-700" onClick={e => e.stopPropagation()}>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}
